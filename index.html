<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo Card</title>
  </head>
  <body>
    <article data-testid="test-todo-card" role="region">
      <!-- Header Section -->
      <div class="card-header">
        <!-- Title -->
        <h2 data-testid="test-todo-title">Todo Card Component</h2>
        <span
          data-testid="test-todo-priority"
          class="priority-badge"
          aria-label="priority-high"
          >🔴 High</span
        >
      </div>
      <!-- Description -->
      <p data-testid="test-todo-description">
        Build a todo card component that displays a title and description. The
        component should be reusable and styled appropriately.
      </p>

      <!-- Due date -->
      <time data-testid="test-todo-due-date" datetime="2026-04-16">
         📅 Due April 16, 2026
      </time>

      <!-- Time remaining -->
      <div data-testid="test-todo-time-remaining">  ⏰ Due in 6 days</div>

      <!-- Status indicator -->
      <div>
        <span data-testid="test-todo-status" aria-label="status-in-progress"
          >🔄 Pending</span
        >
      </div>

      <!-- Checkbox -->
      <div>
        <input
          data-testid="test-todo-complete-toggle"
          type="checkbox"
          id="todo-complete"
        />
        <label for="todo-complete">Mark as complete</label>
      </div>

      <!-- Tags -->
      <ul data-testid="test-todo-tags" class="tags-list" role="list">
        <li data-testid="test-todo-tag-work" class="tag">💼 Work</li>
        <li data-testid="test-todo-tag-urgent"class="tag">🚨 Urgent</li>
      </ul>

      <!-- Actions -->
      <div>
        <button data-testid="test-todo-edit-button"class="btn-edit">✏️ Edit</button>
        <button data-testid="test-todo-delete-button" class="btn-delete">🗑️ Delete</button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
